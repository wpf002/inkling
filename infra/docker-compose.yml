services:
  postgres:
    image: postgres:16-alpine
    container_name: ink_postgres
    environment:
      POSTGRES_USER: inkling
      POSTGRES_PASSWORD: inkling
      POSTGRES_DB: inkling
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkling"]
      interval: 5s
      retries: 10

volumes:
  postgres_data:
